services:
  web:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - static_volume:/app/staticfiles
    restart: unless-stopped
    command: >
      sh -c "
        until pg_isready -h postgres -p 5432; do
          echo 'Waiting for postgres...';
          sleep 2;
        done &&
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn drf_course.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "
  

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
    restart: unless-stopped

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: strongpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped

  celery:
    build: .
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    command: celery -A drf_course worker --loglevel=info
    restart: unless-stopped

volumes:
  static_volume:
  postgres_data:
